<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日記アプリ</title>

<style>
body {
margin: 0;
display: flex;
height: 100vh;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
background: #f5f7fb;
}

/* ダークモード */
body.dark {
background: #1e1e1e;
color: #ddd;
}

/* 左カレンダー */
#calendar {
width: 33%;
overflow-y: scroll;
padding: 15px;
box-sizing: border-box;
background: #ffffff;
border-right: 1px solid #e0e0e0;
}

body.dark #calendar {
background: #2a2a2a;
border-right: 1px solid #444;
}

/* 月 */
.month {
margin-bottom: 25px;
padding: 10px;
border-radius: 12px;
transition: 0.2s;
}

.month:hover {
background: #f0f4ff;
}

body.dark .month:hover {
background: #333;
}

/* タイトル */
.month-title {
font-size: 18px;
font-weight: 600;
margin-bottom: 10px;
}

/* 曜日 */
.weekdays {
display: grid;
grid-template-columns: repeat(7, 1fr);
font-size: 12px;
color: #888;
}

.weekdays div {
text-align: center;
}

/* 日付 */
.days {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 4px;
}

.day {
padding: 10px;
text-align: center;
cursor: pointer;
font-size: 15px;
border-radius: 50%;
transition: 0.2s;
}

.day:hover {
background-color: #e6ecff;
}

body.dark .day:hover {
background-color: #444;
}

/* 日記あり */
.has-diary {
background: #4f7cff;
color: white;
}

/* 選択 */
.selected {
background: #ffb84f;
color: white;
}

/* 今日 */
.today {
border: 2px solid #ff4d4f;
font-weight: bold;
}

/* 右側 */
#content {
width: 67%;
padding: 30px;
box-sizing: border-box;
}

textarea {
width: 100%;
height: 60%;
font-size: 16px;
padding: 15px;
line-height: 2.0;
border-radius: 10px;
border: 1px solid #ccc;
resize: none;
box-sizing: border-box;
}

body.dark textarea {
background: #2a2a2a;
color: white;
border: 1px solid #555;
}

/* ボタン */
button {
margin-top: 10px;
margin-right: 10px;
padding: 10px 20px;
font-size: 14px;
border: none;
border-radius: 8px;
background: #4f7cff;
color: white;
cursor: pointer;
}

button:hover {
background: #3a63d8;
}
</style>
</head>

<body>

<div id="calendar"></div>

<div id="content">
<h2 id="selected-date">日付を選択</h2>
<textarea id="diary"></textarea><br>

<button onclick="saveDiary()">保存</button>
<button onclick="toggleDarkMode()">🌙 ダークモード</button>
</div>

<script>
const calendar = document.getElementById("calendar");
const diaryInput = document.getElementById("diary");
const selectedDateText = document.getElementById("selected-date");

let selectedDate = "";

const startYear = 2025;
const endYear = 2030;

const weekdays = ["日","月","火","水","木","金","土"];

function formatDate(y,m,d){
return y + "-" + String(m).padStart(2,"0") + "-" + String(d).padStart(2,"0");
}

function generateCalendar(){
calendar.innerHTML = "";

const today = new Date();
const todayStr = formatDate(today.getFullYear(), today.getMonth()+1, today.getDate());

for(let year=startYear; year<=endYear; year++){
for(let month=0; month<12; month++){

const monthDiv = document.createElement("div");
monthDiv.className="month";

const title = document.createElement("div");
title.className="month-title";
title.innerText = year+"年 "+(month+1)+"月";
monthDiv.appendChild(title);

const weekDiv = document.createElement("div");
weekDiv.className="weekdays";
weekdays.forEach(w=>{
const el=document.createElement("div");
el.innerText=w;
weekDiv.appendChild(el);
});
monthDiv.appendChild(weekDiv);

const daysDiv = document.createElement("div");
daysDiv.className="days";

const firstDay = new Date(year,month,1).getDay();
const lastDate = new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){
daysDiv.appendChild(document.createElement("div"));
}

for(let day=1;day<=lastDate;day++){
const dateStr = formatDate(year,month+1,day);

const d=document.createElement("div");
d.innerText=day;
d.className="day";

if(dateStr===todayStr){
d.classList.add("today");
}

if(localStorage.getItem(dateStr)){
d.classList.add("has-diary");
}

d.onclick=()=>selectDate(dateStr,d);

daysDiv.appendChild(d);
}

monthDiv.appendChild(daysDiv);
calendar.appendChild(monthDiv);
}
}

scrollToToday();
}

function selectDate(dateStr,el){
selectedDate=dateStr;

document.querySelectorAll(".day").forEach(d=>d.classList.remove("selected"));
el.classList.add("selected");

selectedDateText.innerText=dateStr;
diaryInput.value=localStorage.getItem(dateStr)||"";
}

function saveDiary(){
if(!selectedDate){
alert("日付選んで");
return;
}
localStorage.setItem(selectedDate,diaryInput.value);
generateCalendar();
}

function scrollToToday(){
const el=document.querySelector(".today");
if(el){
el.scrollIntoView({behavior:"smooth",block:"center"});
el.click();
}
}

function toggleDarkMode(){
document.body.classList.toggle("dark");

if (document.body.classList.contains("dark")) {
localStorage.setItem("darkMode", "on");
} else {
localStorage.setItem("darkMode", "off");
}
}

// 起動
generateCalendar();
</script>

</body>
</html>
