<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日記アプリ</title>

<style>
body {
margin: 0;
display: flex;
height: 100vh;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
background: #f5f7fb;
}

body.dark {
background: #1e1e1e;
color: #ddd;
}

#calendar {
width: 33%;
overflow-y: scroll;
padding: 15px;
box-sizing: border-box;
background: #ffffff;
border-right: 1px solid #e0e0e0;
}

body.dark #calendar {
background: #2a2a2a;
border-right: 1px solid #444;
}

.month {
margin-bottom: 25px;
padding: 10px;
border-radius: 12px;
}

.month-title {
font-size: 18px;
font-weight: 600;
margin-bottom: 10px;
}

.weekdays {
display: grid;
grid-template-columns: repeat(7, 1fr);
font-size: 12px;
color: #888;
}

.weekdays div {
text-align: center;
}

.days {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 4px;
}

.day {
padding: 10px;
text-align: center;
cursor: pointer;
font-size: 15px;
border-radius: 50%;
}

.day:hover {
background-color: #e6ecff;
}

body.dark .day:hover {
background-color: #444;
}

.has-diary {
background: #4f7cff;
color: white;
}

.selected {
background: #ffb84f;
color: white;
}

.today {
border: 2px solid #ff4d4f;
font-weight: bold;
}

#content {
width: 67%;
padding: 30px;
box-sizing: border-box;
}
  
textarea {
width: 100%;
height: 80%;
font-size: 16px;
padding: 15px;
line-height: 1.9;
border-radius: 10px;
border: 1px solid #ccc;
resize: none;
box-sizing: border-box;
}

body.dark textarea {
background: #2a2a2a;
color: white;
border: 1px solid #555;
}

button {
margin-top: 10px;
margin-right: 10px;
padding: 10px 20px;
font-size: 14px;
border: none;
border-radius: 8px;
background: #4f7cff;
color: white;
cursor: pointer;
}

#search {
width: 100%;
padding: 10px;
margin-bottom: 10px;
font-size: 14px;
border-radius: 8px;
border: 1px solid #ccc;
}

#search-results {
max-height: 200px;
overflow-y: auto;
margin-bottom: 10px;
}

.result-item {
padding: 8px;
border-bottom: 1px solid #eee;
cursor: pointer;
}

.result-item:hover {
background: #f0f4ff;
}

body.dark .result-item:hover {
background: #444;
}
</style>
</head>

<body>

<div id="calendar"></div>

<div id="content">
<h2 id="selected-date">日付を選択</h2>
<input type="text" id="search" placeholder="検索..." oninput="searchDiary()">
<div id="search-results"></div>
<textarea id="diary" oninput="autoSave()"></textarea><br>

<button onclick="saveDiary()">保存</button>
<button onclick="toggleDarkMode()">🌙 ダークモード</button>
<button onclick="forceUpdate()">更新</button>
</div>

<script>
const calendar = document.getElementById("calendar");
const diaryInput = document.getElementById("diary");
const selectedDateText = document.getElementById("selected-date");

let selectedDate = "";

const startYear = 2025;
const endYear = 2030;

const weekdays = ["日","月","火","水","木","金","土"];

function formatDate(y,m,d){
return y + "-" + String(m).padStart(2,"0") + "-" + String(d).padStart(2,"0");
}

function generateCalendar(){
calendar.innerHTML = "";

const today = new Date();
const todayStr = formatDate(today.getFullYear(), today.getMonth()+1, today.getDate());

for(let year=startYear; year<=endYear; year++){
for(let month=0; month<12; month++){

const monthDiv = document.createElement("div");
monthDiv.className="month";

const title = document.createElement("div");
title.className="month-title";
title.innerText = year+"年 "+(month+1)+"月";
monthDiv.appendChild(title);

const weekDiv = document.createElement("div");
weekDiv.className="weekdays";
weekdays.forEach(w=>{
const el=document.createElement("div");
el.innerText=w;
weekDiv.appendChild(el);
});
monthDiv.appendChild(weekDiv);

const daysDiv = document.createElement("div");
daysDiv.className="days";

const firstDay = new Date(year,month,1).getDay();
const lastDate = new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){
daysDiv.appendChild(document.createElement("div"));
}

for(let day=1;day<=lastDate;day++){
const dateStr = formatDate(year,month+1,day);

const d=document.createElement("div");
d.innerText=day;
d.className="day";
d.dataset.date = dateStr;

if(dateStr===todayStr){
d.classList.add("today");
}

// ⭐ 記念日（毎年4/7）
if ((month + 1 === 4) && day === 7) {
d.classList.add("anniversary");
d.innerHTML = "⭐<br>" + day;
}
  
if(localStorage.getItem(dateStr)){
d.classList.add("has-diary");
}

d.onclick=()=>selectDate(dateStr,d);

daysDiv.appendChild(d);
}

monthDiv.appendChild(daysDiv);
calendar.appendChild(monthDiv);
}
}

setTimeout(scrollToToday, 50);
}

function selectDate(dateStr,el){　

  if (selectedDate) {
    localStorage.setItem(selectedDate, diaryInput.value);
  }
  
selectedDate=dateStr;

localStorage.setItem("lastDate", dateStr);

document.querySelectorAll(".day").forEach(d=>d.classList.remove("selected"));
el.classList.add("selected");

selectedDateText.innerText=dateStr;
diaryInput.value=localStorage.getItem(dateStr)||"";
}

function saveDiary(){
if(!selectedDate){
alert("日付選んで");
return;
}
localStorage.setItem(selectedDate,diaryInput.value);
generateCalendar();
}

function scrollToToday(){
const lastDate = localStorage.getItem("lastDate");

let target = null;

if (lastDate) {
target = document.querySelector('[data-date="' + lastDate + '"]');
}

if (!target) {
target = document.querySelector(".today");
}

if (!target) return;

const container = document.getElementById("calendar");
container.scrollTop = target.offsetTop - container.clientHeight / 2;

target.click();
}

function toggleDarkMode() {
document.body.classList.toggle("dark");

if (document.body.classList.contains("dark")) {
localStorage.setItem("darkMode", "on");
} else {
localStorage.setItem("darkMode", "off");
}
}

if (localStorage.getItem("darkMode") === "on") {
document.body.classList.add("dark");
}

function searchDiary(){
const keyword = document.getElementById("search").value.trim();
const resultsDiv = document.getElementById("search-results");

resultsDiv.innerHTML = "";

if (!keyword) return;

for (let i = 0; i < localStorage.length; i++) {
const key = localStorage.key(i);

// 日付だけ対象（YYYY-MM-DD）
if (!key.match(/^\d{4}-\d{2}-\d{2}$/)) continue;

const text = localStorage.getItem(key);

if (text && text.includes(keyword)) {

const index = text.indexOf(keyword);
const start = Math.max(0, index - 10);
const end = Math.min(text.length, index + 20);

let preview = text.substring(start, end);

// ハイライト
preview = preview.replace(keyword, `<b>${keyword}</b>`);

const div = document.createElement("div");
div.className = "result-item";

div.innerHTML = `
<div><strong>${key}</strong></div>
<div>${preview}...</div>
`;

div.onclick = () => {
const el = document.querySelector('[data-date="' + key + '"]');
if (el) {
el.click();
}
};

resultsDiv.appendChild(div);
}
}
}

function forceUpdate(){
  location.href = location.pathname + "?v=" + Date.now();
}

function autoSave(){
  if (!selectedDate) return;
  localStorage.setItem(selectedDate, diaryInput.value);
}
  
generateCalendar();
</script>

  
</body>
</html>
